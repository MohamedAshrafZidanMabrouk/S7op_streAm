<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>forget password</title>
    <link rel="stylesheet" href="./css/signin.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
  </head>

  <body>
    <div
      class="container-fluid d-flex align-items-center justify-content-center h-100"
    >
      <div
        class="row h-100 w-100 p-4 d-flex align-items-stretch justify-content-center g-4"
      >
        <div class="col left p-5 w-25">
          <div class="title-wrapper">
            <h1 class="bg-color fw-bold fs-1">Amazino</h1>
            <hr />
          </div>

          <br />
          <br />

          <div class="d-flex flex-column g-0">
            <p class="fs-3 fw-bold text-black m-0 p-0">Add a new Password</p>
            <p class="m-0 p-0 text-black fw-light">
              The account has been recovered
            </p>
          </div>

          <br />
          

          <form class="row g-3 needs-validation" novalidate>
            <!--New password -->
            <div class="col-12 pb-2">
              <label for="password" class="form-label">New Password</label>

              <div class="position-relative password-wrapper">
                <input
                  type="password"
                  class="form-control pe-5"
                  id="password"
                  placeholder="Enter password"
                  required
                />

                <i
                  class="pe-3 bi bi-eye position-absolute end-0 me-3 password-eye-icon"
                  id="togglePassword"
                  style="cursor: pointer"
                ></i>
                <div class="invalid-feedback">
                  Please enter a valid password
                </div>
                <div class="valid-feedback">Looks good!</div>
              </div>
            </div>
            <!--Confirm password -->
            <div class="col-12 pb-2">
              <label for="password" class="form-label">Confirm Password </label>

              <div class="position-relative password-wrapper">
                <input
                  type="password"
                  class="form-control pe-5"
                  id="rePassword"
                  placeholder="Enter password"
                  required
                />

                <i
                  class="pe-3 bi bi-eye position-absolute end-0 me-3 password-eye-icon"
                  id="toggleRePassword"
                  style="cursor: pointer"
                ></i>
                <div class="invalid-feedback">
                  Please enter a valid password
                </div>
                <div class="valid-feedback">Looks good!</div>
              </div>
            </div>

            
            <div class="col-12">
              <button
                class="mybutton text-white fw-bold w-100 btn bg-main-color"
                type="submit"
              >
                Reset Password
              </button>
            </div>
          </form>

          <div class="mt-5 text-center w-100">
           

            <p class="text-secondary">
              Already have an account?
              <a
                href="./signin.html"
                class="text-decoration-none fw-bold bg-color signin"
                >Sign In</a
              >
            </p>
          </div>
        </div>

        <div class="col right d-none d-lg-flex">
          <img
            class="w-100 h-100 object-fit-cover rounded-5"
            src="./assets/img2.png"
            alt=""
          />
        </div>
      </div>
    </div>

      
    </div> 

    <!-- sweet alert -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- bootstrap -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>

    <!-- sign in form validation -->
    <script src="./js/forgetPasswordValidation.js"></script>

    <!-- eye toggle -->
    <script src="./js/rePasswordEyeToggle.js"></script>
    <script src="./js/passwordEyeToggle.js"></script>
  </body>
</html>
