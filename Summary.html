<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Summary - Amazino</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  
  <script src="js/navbar.js" defer></script>
  <script src="js/footer.js" defer></script>
  <link rel="stylesheet" type="text/css" href="css/components.css">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    }

    :root {
      --main-color: rgb(124, 29, 124);
      --main-color-hover: rgb(144, 86, 144);
      --secondary-color: #B19470;
      --gray-light: #e0e0e0;
      --gray-medium: #a7a7a7;
      --gray-dark: #6c757d;
      --gray-border: #dee2e6;
    }

    body {
      background-color: #f5f5f5;
      margin: 0;
      padding: 0;
    }

    .summary-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem 1rem;
    }

    .steps-container {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 4rem;
      position: relative;
      padding: 0 1rem;
      width: 100%;
    }

    .step-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3rem;
      position: relative;
      z-index: 3;
      background-color: transparent;
      padding: 0 0.5rem;
    }

    .circle {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background-color: var(--gray-light);
      border: 2px solid var(--gray-border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 1.5rem;
      color: var(--gray-medium);
      transition: all 0.3s ease;
    }

    .step-item.active .circle,
    .step-item.completed .circle {
      background-color: var(--main-color);
      border-color: var(--main-color);
      color: white;
    }

    .step-label {
      font-weight: 500;
      color: var(--gray-medium);
      font-size: 0.95rem;
      text-align: center;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      white-space: nowrap;
    }

    .step-label i {
      color: var(--gray-medium);
      font-size: 1rem;
    }

    .step-item.active .step-label,
    .step-item.completed .step-label {
      color: var(--main-color);
      font-weight: 700;
    }

    .step-item.active .step-label i,
    .step-item.completed .step-label i {
      color: var(--main-color);
    }

    .step-line {
      width: 100px;
      height: 2px;
      background-color: var(--gray-border);
      margin: 0 0.5rem;
      z-index: 2;
      position: relative;
      top: -0.6rem;
    }

    .summary-content {
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
    }

    .left-section {
      flex: 2;
      min-width: 400px;
    }

    .info-card {
      background: white;
      border-radius: 30px;
      padding: 2rem;
      margin-bottom: 2rem;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
    }

    .card-title {
      color: var(--main-color);
      font-weight: 700;
      font-size: 1.5rem;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .card-title i {
      color: var(--secondary-color);
    }

    .address-details {
      line-height: 1.8;
    }

    .address-name {
      font-weight: 700;
      color: var(--main-color);
      font-size: 1.1rem;
    }

    .address-line {
      color: var(--gray-dark);
      font-size: 1rem;
    }

    .address-email {
      color: var(--main-color);
      font-weight: 500;
      margin-top: 0.5rem;
    }

    .payment-status {
      display: inline-block;
      background-color: #fff3cd;
      color: #856404;
      padding: 0.5rem 2rem;
      border-radius: 50px;
      font-weight: 600;
      font-size: 1rem;
      border: 1px solid #ffeeba;
    }

    .payment-method-name {
      font-weight: 700;
      color: var(--main-color);
      font-size: 1.1rem;
      margin-bottom: 0.5rem;
    }

    .order-items-title {
      color: var(--main-color);
      font-weight: 700;
      font-size: 1.3rem;
      margin-bottom: 1.5rem;
    }

    .items-count {
      color: var(--gray-medium);
      font-weight: normal;
      margin-left: 0.5rem;
    }

    .order-item {
      display: flex;
      align-items: center;
      padding: 1.5rem 0;
      border-bottom: 1px solid var(--gray-border);
    }

    .order-item:last-child {
      border-bottom: none;
    }

    .item-image {
      width: 80px;
      height: 80px;
      border-radius: 15px;
      overflow: hidden;
      margin-right: 1.5rem;
      background-color: #f0f0f0;
    }

    .item-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .item-details {
      flex: 2;
    }

    .item-name {
      font-weight: 700;
      color: var(--main-color);
      font-size: 1.1rem;
      margin-bottom: 0.25rem;
    }

    .item-color {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--gray-dark);
      font-size: 0.9rem;
    }

    .color-dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
    }

    .item-price {
      flex: 1;
      text-align: center;
      font-weight: 600;
      color: var(--main-color);
    }

    .item-quantity {
      flex: 1;
      text-align: center;
      color: var(--gray-dark);
    }

    .item-total {
      flex: 1;
      text-align: center;
      font-weight: 700;
      color: var(--main-color);
      font-size: 1.1rem;
    }

    .order-summary-card {
      flex: 1;
      min-width: 280px;
      background: white;
      border-radius: 30px;
      padding: 2rem;
      position: sticky;
      top: 2rem;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
      height: fit-content;
    }

    .summary-title {
      color: var(--main-color);
      font-weight: 700;
      font-size: 1.3rem;
      margin-bottom: 1.5rem;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 1rem;
      color: var(--gray-dark);
      font-size: 0.95rem;
    }

    .summary-row.total {
      font-weight: 700;
      color: var(--main-color);
      font-size: 1.3rem;
      border-top: 2px dashed var(--gray-border);
      padding-top: 1rem;
      margin-top: 1rem;
    }

    .tax-note {
      text-align: right;
      color: var(--gray-medium);
      font-size: 0.8rem;
      margin-top: 0.5rem;
    }

    .place-order-btn {
      background-color: var(--main-color);
      color: white;
      border: none;
      padding: 1rem;
      border-radius: 50px;
      font-weight: 600;
      font-size: 1.1rem;
      width: 100%;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 2rem;
    }

    .place-order-btn:hover {
      background-color: var(--main-color-hover);
    }

    @media (max-width: 768px) {
      .step-line {
        display: none;
      }
      
      .steps-container {
        flex-wrap: wrap;
        gap: 1rem;
      }
      
      .summary-content {
        flex-direction: column;
      }
      
      .order-summary-card {
        position: static;
      }

      .order-item {
        flex-wrap: wrap;
        gap: 1rem;
      }

      .item-image {
        margin-bottom: 0.5rem;
      }
    }
  </style>
</head>
<body>
  <div id="navbar-container"></div>

  <div class="summary-container">
    <div class="steps-container">
      <div class="step-item completed">
        <div class="circle">1</div>
        <div class="step-label">
          <i class="fas fa-shopping-cart"></i> Shopping Cart
        </div>
      </div>
      
      <div class="step-line"></div>
      
      <div class="step-item completed">
        <div class="circle">2</div>
        <div class="step-label">
          <i class="fas fa-truck"></i> Shipping
        </div>
      </div>
      
      <div class="step-line"></div>
      
      <div class="step-item completed">
        <div class="circle">3</div>
        <div class="step-label">
          <i class="fas fa-credit-card"></i> Payment
        </div>
      </div>
      
      <div class="step-line"></div>
      
      <div class="step-item active">
        <div class="circle">4</div>
        <div class="step-label">
          <i class="fas fa-file-invoice"></i> Summary
        </div>
      </div>
    </div>

    <div class="summary-content">
      <div class="left-section">
        <div class="info-card">
          <div class="card-title">
            <i class="fas fa-map-marker-alt"></i>
            Shipping Address
          </div>
          <div class="address-details" id="shipping-address"></div>
        </div>

        <div class="info-card">
          <div class="card-title">
            <i class="fas fa-credit-card"></i>
            Payment Method
          </div>
          <div id="payment-method-display"></div>
        </div>

        <div class="info-card">
          <div class="order-items-title">
            Order Items
            <span class="items-count" id="items-count">(0)</span>
          </div>

          <div id="order-items-container"></div>
        </div>
      </div>

      <div class="order-summary-card">
        <div class="summary-title">Order Summary</div>
        
        <div class="summary-row">
          <span>Subtotal</span>
          <span id="summary-subtotal">$0.00</span>
        </div>
        <div class="summary-row">
          <span>Discount</span>
          <span id="summary-discount">-$19.50</span>
        </div>
        <div class="summary-row">
          <span>Shipping</span>
          <span id="summary-shipping">$0.00</span>
        </div>
        <div class="summary-row">
          <span>Tax</span>
          <span id="summary-tax">$0.00</span>
        </div>
        <div class="summary-row total">
          <span>Total</span>
          <span id="summary-total">$0.00</span>
        </div>
        <div class="tax-note">Including Valid Tax</div>

        <button class="place-order-btn" onclick="placeOrder()">
          Place Order <i class="fas fa-check-circle"></i>
        </button>
      </div>
    </div>
  </div>

  <div id="footer-container"></div>

  <script>
    function loadSummaryData() {
      const cart = JSON.parse(localStorage.getItem('shoppingCart')) || [];
      
      const shippingData = JSON.parse(localStorage.getItem('shippingData')) || {
        firstName: 'Sara',
        lastName: 'Samir',
        street: 'elharam',
        city: 'Giza',
        state: 'Egypt',
        zip: '12354',
        email: 'sarahghazally45@gmail.com'
      };
      
      const paymentMethod = localStorage.getItem('paymentMethod') || 'cod';
      
      document.getElementById('items-count').textContent = `(${cart.length})`;
      
      displayShippingAddress(shippingData);
      displayPaymentMethod(paymentMethod);
      displayCartItems(cart);
      calculateTotals(cart);
    }

    function displayShippingAddress(data) {
      const addressDiv = document.getElementById('shipping-address');
      addressDiv.innerHTML = `
        <div class="address-name">${data.firstName} ${data.lastName}</div>
        <div class="address-line">${data.street}</div>
        <div class="address-line">${data.city}, ${data.state} - ${data.zip}</div>
        <div class="address-email">${data.email}</div>
      `;
    }

    function displayPaymentMethod(method) {
      const paymentDiv = document.getElementById('payment-method-display');
      let methodName = '';
      
      switch(method) {
        case 'paypal':
          methodName = 'PayPal';
          break;
        case 'cod':
          methodName = 'Cash On Delivery';
          break;
        default:
          methodName = 'Cash On Delivery';
      }
      
      paymentDiv.innerHTML = `
        <div class="payment-method-name">${methodName}</div>
        <div class="payment-status">
          <i class="fas fa-hourglass-half me-2"></i>
          PENDING
        </div>
      `;
    }

    function displayCartItems(cart) {
      const container = document.getElementById('order-items-container');
      
      if (cart.length === 0) {
        container.innerHTML = '<div class="text-center py-4">No items in cart</div>';
        return;
      }
      
      let html = '';
      
      cart.forEach(item => {
        const itemSubtotal = item.price * item.quantity;
        
        html += `
          <div class="order-item">
            <div class="item-image">
              <img src="${item.image || 'https://via.placeholder.com/80'}" alt="${item.name}">
            </div>
            <div class="item-details">
              <div class="item-name">${item.name}</div>
              <div class="item-color">
                <span class="color-dot" style="background-color: ${getColorCode(item.color)};"></span>
                <span>${item.color || 'Black'}</span>
              </div>
            </div>
            <div class="item-price">$${item.price.toFixed(2)}</div>
            <div class="item-quantity">Qty: ${item.quantity}</div>
            <div class="item-total">$${itemSubtotal.toFixed(2)}</div>
          </div>
        `;
      });
      
      container.innerHTML = html;
    }

    function calculateTotals(cart) {
      let subtotal = 0;
      cart.forEach(item => {
        subtotal += item.price * item.quantity;
      });
      
      const discount = 19.50;
      const shipping = 0.00;
      const tax = 0.00;
      const total = subtotal - discount + shipping + tax;
      
      document.getElementById('summary-subtotal').textContent = `$${subtotal.toFixed(2)}`;
      document.getElementById('summary-discount').textContent = `-$${discount.toFixed(2)}`;
      document.getElementById('summary-shipping').textContent = `$${shipping.toFixed(2)}`;
      document.getElementById('summary-tax').textContent = `$${tax.toFixed(2)}`;
      document.getElementById('summary-total').textContent = `$${total.toFixed(2)}`;
    }

    function getColorCode(color) {
      const colors = {
        'black': '#2d2d2d',
        'white': '#f8f8f8',
        'gray': '#9ea5a9',
        'silver': '#c0c0c0',
        'gold': '#d4af37',
        'brown': '#8b5a2b',
        'beige': '#e8d9c5',
        'navy': '#2c4059',
        'blue': '#4a7ae3',
        'red': '#e34a4a',
        'green': '#4ae37a',
        'yellow': '#e3d34a',
        'purple': '#a64ae3',
        'pink': '#e34aa6',
        'orange': '#ffa500',
        'olive': '#7a8b6b'
      };
      return colors[color?.toLowerCase()] || '#2d2d2d';
    }

    function placeOrder() {
      localStorage.removeItem('shoppingCart');
      localStorage.removeItem('shippingData');
      localStorage.removeItem('paymentMethod');
      
      window.location.href = 'Order_Placed.html';
    }

    window.onload = loadSummaryData;
  </script>
</body>
</html>
