<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Status - Amazino</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  
  <script src="js/navbar.js" defer></script>
  <script src="js/footer.js" defer></script>
  <link rel="stylesheet" type="text/css" href="css/components.css">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    }

    :root {
      --main-color: rgb(124, 29, 124);
      --main-color-hover: rgb(144, 86, 144);
      --secondary-color: #B19470;
      --gray-light: #e0e0e0;
      --gray-medium: #a7a7a7;
      --gray-dark: #6c757d;
      --gray-border: #dee2e6;
      --success-color: #28a745;
      --warning-color: #ffc107;
      --danger-color: #dc3545;
      --info-color: #17a2b8;
    }

    body {
      background-color: #f8f9fa;
      margin: 0;
      padding: 0;
    }

    .status-badge {
      display: inline-block;
      padding: 0.35rem 1rem;
      border-radius: 50px;
      font-size: 0.85rem;
      font-weight: 600;
    }

    .status-pending { background-color: #fff3cd; color: #856404; }
    .status-processing { background-color: #cce5ff; color: #004085; }
    .status-shipped { background-color: #d4edda; color: #155724; }
    .status-delivered { background-color: #d1e7dd; color: #0f5132; }
    .status-cancelled { background-color: #f8d7da; color: #721c24; }

    .track-wrapper {
      width: 100%;
      max-width: 1200px;
      margin: 2rem auto;
      padding: 0 1.5rem;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      color: var(--main-color);
      margin-bottom: 0.5rem;
      text-align: center;
    }

    .breadcrumb-links {
      text-align: center;
      margin-bottom: 2rem;
      color: var(--gray-dark);
      font-size: 1rem;
    }

    .breadcrumb-links a {
      color: var(--secondary-color);
      text-decoration: none;
      transition: color 0.2s;
    }

    .breadcrumb-links a:hover {
      color: var(--main-color);
    }

    .order-info-card {
      background: white;
      border-radius: 20px;
      padding: 2rem;
      margin-bottom: 2rem;
      box-shadow: 0 5px 20px rgba(0,0,0,0.05);
      border: 1px solid var(--gray-border);
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 1.5rem;
    }

    .info-item {
      padding: 0.5rem 0;
    }

    .info-label {
      font-size: 0.85rem;
      color: var(--gray-medium);
      margin-bottom: 0.3rem;
    }

    .info-value {
      font-weight: 600;
      color: var(--main-color);
      font-size: 1rem;
    }

    .timeline-box {
      background: white;
      border-radius: 20px;
      padding: 2rem;
      margin-bottom: 2rem;
      border: 1px solid var(--gray-border);
    }

    .timeline-box h3 {
      color: var(--main-color);
      font-size: 1.3rem;
      margin-bottom: 2rem;
    }

    .timeline-steps {
      display: flex;
      justify-content: space-between;
      position: relative;
    }

    .timeline-step {
      flex: 1;
      text-align: center;
      position: relative;
      z-index: 2;
    }

    .step-icon {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background-color: var(--gray-light);
      border: 2px solid var(--gray-border);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1rem;
      color: var(--gray-medium);
    }

    .step-icon.completed {
      background-color: var(--main-color);
      border-color: var(--main-color);
      color: white;
    }

    .step-icon.active {
      background-color: var(--secondary-color);
      border-color: var(--secondary-color);
      color: white;
    }

    .step-name {
      font-weight: 600;
      color: var(--gray-dark);
      margin-bottom: 0.3rem;
    }

    .step-date {
      font-size: 0.8rem;
      color: var(--gray-medium);
    }

    .timeline-steps::before {
      content: '';
      position: absolute;
      top: 25px;
      left: 0;
      right: 0;
      height: 2px;
      background-color: var(--gray-border);
      z-index: 1;
    }

    .products-section {
      background: white;
      border-radius: 20px;
      padding: 2rem;
      border: 1px solid var(--gray-border);
    }

    .products-section h3 {
      color: var(--main-color);
      font-size: 1.3rem;
      margin-bottom: 1.5rem;
    }

    .product-item {
      display: flex;
      align-items: center;
      padding: 1rem 0;
      border-bottom: 1px solid var(--gray-border);
    }

    .product-item:last-child {
      border-bottom: none;
    }

    .product-image {
      width: 70px;
      height: 70px;
      border-radius: 12px;
      overflow: hidden;
      margin-right: 1.5rem;
      background-color: #f0f0f0;
    }

    .product-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .product-details {
      flex: 1;
    }

    .product-name {
      font-weight: 600;
      color: var(--main-color);
      font-size: 1.1rem;
      margin-bottom: 0.3rem;
    }

    .product-meta {
      color: var(--gray-medium);
      font-size: 0.9rem;
    }

    .product-price {
      font-weight: 600;
      color: var(--main-color);
      font-size: 1.1rem;
      min-width: 100px;
      text-align: right;
    }

    .loading-spinner {
      text-align: center;
      padding: 4rem;
    }

    .error-message {
      text-align: center;
      padding: 4rem;
      color: var(--danger-color);
    }

    @media (max-width: 768px) {
      .track-wrapper {
        padding: 0 1rem;
      }
      
      .timeline-steps {
        flex-direction: column;
        gap: 1.5rem;
      }
      
      .timeline-steps::before {
        display: none;
      }
      
      .timeline-step {
        display: flex;
        align-items: center;
        gap: 1rem;
        text-align: left;
      }
      
      .step-icon {
        margin: 0;
      }
      
      .product-item {
        flex-wrap: wrap;
      }
      
      .product-price {
        text-align: left;
        margin-top: 0.5rem;
      }
    }
  </style>
</head>
<body>
  <div id="navbar-container"></div>

  <div class="track-wrapper">
    <h1>Order Status</h1>
    
    <div class="breadcrumb-links">
      <a href="index.html">Home</a>
      <span>/</span>
      <a href="Track_Order.html">Track Your Order</a>
      <span>/</span>
      <span style="color: var(--main-color);">Order Status</span>
    </div>

    <div id="loading-spinner" class="loading-spinner">
      <div class="spinner-border text-main" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
      <p class="mt-3">Loading order details...</p>
    </div>

    <div id="order-content" style="display: none;"></div>

    <div id="error-content" class="error-message" style="display: none;">
      <i class="fas fa-exclamation-circle fa-4x mb-3"></i>
      <h3>Order Not Found</h3>
      <p class="text-secondary mb-4">We couldn't find an order with the provided information.</p>
      <a href="Track_Order.html" class="btn btn-main">Try Again</a>
    </div>
  </div>

  <div id="footer-container"></div>

  <script>
    const ORDERS_API_URL = 'https://69a0ea5f2e82ee536f9fcd23.mockapi.io/data';

    async function loadOrderDetails() {
      const orderId = localStorage.getItem('trackingOrderId');
      const orderData = localStorage.getItem('currentOrderData');

      if (!orderId) {
        showError();
        return;
      }

      try {
        let order = null;

        if (orderData) {
          order = JSON.parse(orderData);
        } else {
          const response = await fetch(ORDERS_API_URL);
          if (!response.ok) throw new Error('Failed to fetch orders');
          
          const allOrders = await response.json();
          order = allOrders.find(o => o.orderId === orderId);
        }

        if (order) {
          displayOrderDetails(order);
        } else {
          showError();
        }
      } catch (error) {
        console.error('Error loading order:', error);
        showError();
      }
    }

    function displayOrderDetails(order) {
      document.getElementById('loading-spinner').style.display = 'none';
      
      const orderDate = new Date(order.orderDate).toLocaleDateString('en-US', {
        year: 'numeric',
        month: 'long',
        day: 'numeric'
      });

      const statusClass = `status-${order.status}`;

      const html = `
        <div class="order-info-card">
          <div class="info-grid">
            <div class="info-item">
              <div class="info-label">Order ID</div>
              <div class="info-value">${order.orderId}</div>
            </div>
            <div class="info-item">
              <div class="info-label">Order Date</div>
              <div class="info-value">${orderDate}</div>
            </div>
            <div class="info-item">
              <div class="info-label">Payment Method</div>
              <div class="info-value">${formatPaymentMethod(order.paymentMethod)}</div>
            </div>
            <div class="info-item">
              <div class="info-label">Order Status</div>
              <div class="info-value"><span class="status-badge ${statusClass}">${order.status}</span></div>
            </div>
            <div class="info-item">
              <div class="info-label">Customer Name</div>
              <div class="info-value">${order.customer.firstName} ${order.customer.lastName}</div>
            </div>
            <div class="info-item">
              <div class="info-label">Email</div>
              <div class="info-value">${order.customer.email}</div>
            </div>
            <div class="info-item">
              <div class="info-label">Phone</div>
              <div class="info-value">${order.customer.phone}</div>
            </div>
            <div class="info-item">
              <div class="info-label">Shipping Address</div>
              <div class="info-value">${order.shippingAddress.street}, ${order.shippingAddress.city}, ${order.shippingAddress.state} ${order.shippingAddress.zip}, ${order.shippingAddress.country}</div>
            </div>
          </div>
        </div>

        <div class="timeline-box">
          <h3>Order Timeline</h3>
          <div class="timeline-steps">
            ${createTimelineSteps(order.status)}
          </div>
        </div>

        <div class="products-section">
          <h3>Order Items</h3>
          ${order.items.map(item => `
            <div class="product-item">
              <div class="product-image">
                <img src="${item.image || 'https://via.placeholder.com/70'}" alt="${item.name}" onerror="this.src='https://via.placeholder.com/70'">
              </div>
              <div class="product-details">
                <div class="product-name">${item.name}</div>
                <div class="product-meta">Color: ${item.color || 'Black'} | Qty: ${item.quantity}</div>
              </div>
              <div class="product-price">$${(item.price * item.quantity).toFixed(2)}</div>
            </div>
          `).join('')}
          
          <div class="order-summary mt-4 pt-3 border-top">
            <div class="d-flex justify-content-between mb-2">
              <span>Subtotal:</span>
              <span>$${order.totals.subtotal.toFixed(2)}</span>
            </div>
            <div class="d-flex justify-content-between mb-2">
              <span>Discount:</span>
              <span>-$${order.totals.discount.toFixed(2)}</span>
            </div>
            <div class="d-flex justify-content-between mb-2">
              <span>Shipping:</span>
              <span>$${order.totals.shipping.toFixed(2)}</span>
            </div>
            <div class="d-flex justify-content-between mb-2">
              <span>Tax:</span>
              <span>$${order.totals.tax.toFixed(2)}</span>
            </div>
            <div class="d-flex justify-content-between fw-bold">
              <span>Total:</span>
              <span class="text-main">$${order.totals.total.toFixed(2)}</span>
            </div>
          </div>
        </div>
      `;

      document.getElementById('order-content').innerHTML = html;
      document.getElementById('order-content').style.display = 'block';
    }

    function createTimelineSteps(status) {
      const steps = [
        { name: 'Order Placed', key: 'placed', completed: true },
        { name: 'Accepted', key: 'accepted', completed: ['accepted', 'processing', 'shipped', 'delivered'].includes(status) },
        { name: 'Processing', key: 'processing', completed: ['processing', 'shipped', 'delivered'].includes(status) },
        { name: 'Shipped', key: 'shipped', completed: ['shipped', 'delivered'].includes(status) },
        { name: 'Delivered', key: 'delivered', completed: status === 'delivered' }
      ];

      return steps.map(step => `
        <div class="timeline-step">
          <div class="step-icon ${step.completed ? 'completed' : ''}">
            <i class="fas fa-${getStepIcon(step.key)}"></i>
          </div>
          <div class="step-name">${step.name}</div>
          <div class="step-date">${step.completed ? 'Completed' : 'Pending'}</div>
        </div>
      `).join('');
    }

    function getStepIcon(step) {
      const icons = {
        'placed': 'box',
        'accepted': 'check-circle',
        'processing': 'cog',
        'shipped': 'truck',
        'delivered': 'home'
      };
      return icons[step] || 'circle';
    }

    function formatPaymentMethod(method) {
      const methods = {
        'cod': 'Cash on Delivery',
        'paypal': 'PayPal',
        'card': 'Credit Card',
        'online': 'Online Payment'
      };
      return methods[method] || method;
    }

    function showError() {
      document.getElementById('loading-spinner').style.display = 'none';
      document.getElementById('error-content').style.display = 'block';
    }

    window.onload = loadOrderDetails;
  </script>
</body>
</html>
