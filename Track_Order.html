<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Track Your Order</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
 
  <script src="js/navbar.js" defer></script>
  <script src="js/footer.js" defer></script>
  <link rel="stylesheet" type="text/css" href="css/components.css">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    }

    :root {
      --main-color: rgb(124, 29, 124);
      --main-color-hover: rgb(144, 86, 144);
      --secondary-color: #B19470;
      --gray-light: #e0e0e0;
      --gray-medium: #a7a7a7;
      --gray-dark: #6c757d;
      --gray-border: #dee2e6;
      --placeholder-color: #a0a0a0;
      --error-color: #dc3545;
      --success-color: #28a745;
    }

    body {
      background-color: #f8f9fa;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      margin: 0;
      padding: 0;
    }

    .main-content {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .track-card {
      max-width: 600px;
      width: 100%;
      background: white;
      border-radius: 30px;
      padding: 3rem 2.5rem;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
      border: 1px solid var(--gray-border);
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      color: var(--main-color);
      margin-bottom: 0.75rem;
      text-align: center;
    }

    .breadcrumb-links {
      text-align: center;
      margin-bottom: 2rem;
      color: var(--gray-dark);
      font-size: 1rem;
    }

    .breadcrumb-links a {
      color: var(--secondary-color);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }

    .breadcrumb-links a:hover {
      color: var(--main-color);
    }

    .breadcrumb-links span {
      color: var(--gray-medium);
      margin: 0 0.5rem;
    }

    .description {
      text-align: center;
      color: var(--gray-dark);
      margin-bottom: 2.5rem;
      line-height: 1.6;
      font-size: 1rem;
      background-color: #f8f9fa;
      padding: 1.2rem;
      border-radius: 20px;
      border-left: 4px solid var(--secondary-color);
    }

    .form-group {
      margin-bottom: 1.8rem;
    }

    .form-label {
      font-weight: 600;
      color: var(--main-color);
      margin-bottom: 0.5rem;
      display: block;
      font-size: 1rem;
    }

    .form-label span {
      color: #dc3545;
      font-size: 1.2rem;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-icon {
      position: absolute;
      left: 15px;
      color: var(--gray-medium);
      font-size: 1rem;
    }

    .form-control {
      width: 100%;
      padding: 0.9rem 1rem 0.9rem 45px;
      border: 1.5px solid var(--gray-border);
      border-radius: 50px;
      font-size: 0.95rem;
      transition: all 0.2s;
      background-color: white;
    }

    .form-control:focus {
      outline: none;
      border-color: var(--main-color);
      box-shadow: 0 0 0 3px rgba(124, 29, 124, 0.1);
    }

    .form-control::placeholder {
      color: var(--placeholder-color);
      font-size: 0.9rem;
    }

    .error-message {
      color: var(--error-color);
      font-size: 0.85rem;
      margin-top: 0.5rem;
      padding-left: 15px;
      display: none;
    }

    .error-message i {
      margin-right: 5px;
    }

    .track-btn {
      background-color: var(--main-color);
      color: white;
      border: none;
      padding: 1rem 2rem;
      border-radius: 50px;
      font-weight: 600;
      font-size: 1.1rem;
      width: 100%;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 1rem;
      box-shadow: 0 4px 15px rgba(124, 29, 124, 0.2);
    }

    .track-btn:hover {
      background-color: var(--main-color-hover);
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(124, 29, 124, 0.3);
    }

    .track-btn i {
      font-size: 1.1rem;
    }

    .form-control.error {
      border-color: var(--error-color);
    }

    .form-control.success {
      border-color: var(--success-color);
    }

    @media (max-width: 576px) {
      .track-card {
        padding: 2rem 1.5rem;
      }
      
      h1 {
        font-size: 2rem;
      }
    }
  </style>
</head>
<body>
  <div id="navbar-container"></div>

  <div class="main-content">
    <div class="track-card">
      <h1>Track Your Order</h1>
      
      <div class="breadcrumb-links">
        <a href="index.html">Home</a>
        <span>/</span>
        <span style="color: var(--main-color);">Track Your Order</span>
      </div>
      
      <div class="description">
        To track your order please enter your Order ID in the box below and press the "Track Order" button. This was given to you on your receipt and in the confirmation email you should have received.
      </div>
      
      <form id="trackOrderForm" onsubmit="trackOrder(event)">
        <div class="form-group">
          <label class="form-label">
            Order ID <span>*</span>
          </label>
          <div class="input-wrapper">
            <i class="fas fa-hashtag input-icon"></i>
            <input type="text" class="form-control" id="orderId" placeholder="Enter Your Order ID" required>
          </div>
          <div class="error-message" id="orderIdError">
            <i class="fas fa-exclamation-circle"></i> Invalid Order ID
          </div>
        </div>
        
        <div class="form-group">
          <label class="form-label">
            Billing Email <span>*</span>
          </label>
          <div class="input-wrapper">
            <i class="fas fa-envelope input-icon"></i>
            <input type="email" class="form-control" id="billingEmail" placeholder="Enter Email Address" required>
          </div>
          <div class="error-message" id="emailError">
            <i class="fas fa-exclamation-circle"></i> This email doesn't match the order email
          </div>
        </div>
        
        <button type="submit" class="track-btn" id="trackBtn">
          <i class="fas fa-search"></i> Track Order
        </button>
      </form>
    </div>
  </div>

  <div id="footer-container"></div>

  <script>
    const ORDERS_API_URL = 'https://69a0ea5f2e82ee536f9fcd23.mockapi.io/data';

    async function findOrderInAPI(orderId, email) {
      try {
        const response = await fetch(ORDERS_API_URL);
        if (!response.ok) return null;
        const allOrders = await response.json();

        const foundOrder = allOrders.find(order =>
          order.orderId === orderId &&
          order.customer?.email?.toLowerCase() === email.toLowerCase()
        );
        return foundOrder;
      } catch (error) {
        console.error('Error finding order in API:', error);
        return null;
      }
    }

    function getOrderData() {
      const orderNumber = localStorage.getItem('globalOrderCounter');
      const shippingData = JSON.parse(localStorage.getItem('shippingData'));
      
      console.log('Retrieved shippingData:', shippingData);
      
      let orderEmail = '';
      
      if (shippingData) {
        orderEmail = shippingData.orderEmail || shippingData.email || '';
      }
      
      console.log('Order email to validate:', orderEmail);
      
      return {
        orderId: orderNumber ? `#SDGT${String(orderNumber).padStart(4, '0')}` : '#SDGT0015',
        email: orderEmail
      };
    }

    function validateOrderId() {
      const enteredId = document.getElementById('orderId').value.trim();
      const storedData = getOrderData();
      const orderInput = document.getElementById('orderId');
      const errorDiv = document.getElementById('orderIdError');
      
      orderInput.classList.remove('error', 'success');
      errorDiv.style.display = 'none';
      
      if (enteredId === '') {
        orderInput.classList.add('error');
        return false;
      }
      
      if (enteredId === storedData.orderId) {
        orderInput.classList.add('success');
        return true;
      } else {
        orderInput.classList.add('error');
        errorDiv.style.display = 'block';
        return false;
      }
    }

    function validateEmail() {
      const enteredEmail = document.getElementById('billingEmail').value.trim();
      const storedData = getOrderData();
      const emailInput = document.getElementById('billingEmail');
      const errorDiv = document.getElementById('emailError');
      
      emailInput.classList.remove('error', 'success');
      errorDiv.style.display = 'none';
      
      if (enteredEmail === '') {
        emailInput.classList.add('error');
        return false;
      }
      
      if (!storedData.email) {
        console.warn('No stored email found, allowing any email');
        emailInput.classList.add('success');
        return true;
      }
      
      if (enteredEmail.toLowerCase() === storedData.email.toLowerCase()) {
        emailInput.classList.add('success');
        return true;
      } else {
        emailInput.classList.add('error');
        errorDiv.style.display = 'block';
        return false;
      }
    }

    function validateAll() {
      const isOrderIdValid = validateOrderId();
      const isEmailValid = validateEmail();
      return isOrderIdValid && isEmailValid;
    }

    async function trackOrder(event) {
      event.preventDefault();

      const enteredId = document.getElementById('orderId').value.trim();
      const enteredEmail = document.getElementById('billingEmail').value.trim();

      const orderFromAPI = await findOrderInAPI(enteredId, enteredEmail);

      if (orderFromAPI) {
        console.log('Order found in API:', orderFromAPI);
        localStorage.setItem('trackingOrderId', enteredId);
        localStorage.setItem('currentOrderData', JSON.stringify(orderFromAPI));
        window.location.href = 'Order_Status.html';
        return;
      }

      console.log('Order not found in API, checking localStorage...');
      if (validateAll()) {
        localStorage.setItem('trackingOrderId', enteredId);
        window.location.href = 'Order_Status.html';
      } else {
        alert('Order not found. Please check your Order ID and Billing Email.');
      }
    }

    document.getElementById('orderId').addEventListener('input', function() {
      const input = this;
      const errorDiv = document.getElementById('orderIdError');
      input.classList.remove('error', 'success');
      errorDiv.style.display = 'none';
    });

    document.getElementById('billingEmail').addEventListener('input', function() {
      const input = this;
      const errorDiv = document.getElementById('emailError');
      input.classList.remove('error', 'success');
      errorDiv.style.display = 'none';
    });

    document.getElementById('orderId').addEventListener('blur', validateOrderId);
    document.getElementById('billingEmail').addEventListener('blur', validateEmail);

    window.onload = function() {
      const storedData = getOrderData();
      if (storedData.email) {
        console.log('Expected email for testing:', storedData.email);
      } else {
        console.log('No stored email found. Please complete checkout first.');
      }
    };
  </script>
</body>
</html>
