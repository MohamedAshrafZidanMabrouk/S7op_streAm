<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Track Your Order</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
 
  <script src="js/auth.js"></script>
  <script src="js/store.js"></script>
  <script src="js/data.js"></script>
  <script src="js/navbar.js"></script>
  <script src="js/footer.js"></script>
  <link rel="stylesheet" type="text/css" href="css/components.css">
  <link rel="stylesheet" href="css/Navbarauth.css">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    }

    :root {
      --main-color: rgb(124, 29, 124);
      --main-color-hover: rgb(144, 86, 144);
      --secondary-color: #B19470;
      --gray-light: #e0e0e0;
      --gray-medium: #a7a7a7;
      --gray-dark: #6c757d;
      --gray-border: #dee2e6;
      --placeholder-color: #a0a0a0;
      --error-color: #dc3545;
      --success-color: #28a745;
    }

    body {
      background-color: #f8f9fa;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      margin: 0;
      padding: 0;
    }

    .main-content {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .track-card {
      max-width: 600px;
      width: 100%;
      background: white;
      border-radius: 30px;
      padding: 3rem 2.5rem;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
      border: 1px solid var(--gray-border);
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      color: var(--main-color);
      margin-bottom: 0.75rem;
      text-align: center;
    }

    .breadcrumb-links {
      text-align: center;
      margin-bottom: 2rem;
      color: var(--gray-dark);
      font-size: 1rem;
    }

    .breadcrumb-links a {
      color: var(--secondary-color);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }

    .breadcrumb-links a:hover {
      color: var(--main-color);
    }

    .breadcrumb-links span {
      color: var(--gray-medium);
      margin: 0 0.5rem;
    }

    .description {
      text-align: center;
      color: var(--gray-dark);
      margin-bottom: 2.5rem;
      line-height: 1.6;
      font-size: 1rem;
      background-color: #f8f9fa;
      padding: 1.2rem;
      border-radius: 20px;
      border-left: 4px solid var(--secondary-color);
    }

    .form-group {
      margin-bottom: 1.8rem;
    }

    .form-label {
      font-weight: 600;
      color: var(--main-color);
      margin-bottom: 0.5rem;
      display: block;
      font-size: 1rem;
    }

    .form-label span {
      color: #dc3545;
      font-size: 1.2rem;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-icon {
      position: absolute;
      left: 15px;
      color: var(--gray-medium);
      font-size: 1rem;
    }

    .form-control {
      width: 100%;
      padding: 0.9rem 1rem 0.9rem 45px;
      border: 1.5px solid var(--gray-border);
      border-radius: 50px;
      font-size: 0.95rem;
      transition: all 0.2s;
      background-color: white;
    }

    .form-control:focus {
      outline: none;
      border-color: var(--main-color);
      box-shadow: 0 0 0 3px rgba(124, 29, 124, 0.1);
    }

    .form-control::placeholder {
      color: var(--placeholder-color);
      font-size: 0.9rem;
    }

    .error-message {
      color: var(--error-color);
      font-size: 0.85rem;
      margin-top: 0.5rem;
      padding-left: 15px;
      display: none;
    }

    .error-message i {
      margin-right: 5px;
    }

    .track-btn {
      background-color: var(--main-color);
      color: white;
      border: none;
      padding: 1rem 2rem;
      border-radius: 50px;
      font-weight: 600;
      font-size: 1.1rem;
      width: 100%;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 1rem;
      box-shadow: 0 4px 15px rgba(124, 29, 124, 0.2);
    }

    .track-btn:hover {
      background-color: var(--main-color-hover);
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(124, 29, 124, 0.3);
    }

    .track-btn i {
      font-size: 1.1rem;
    }

    .form-control.error {
      border-color: var(--error-color);
    }

    .form-control.success {
      border-color: var(--success-color);
    }

    @media (max-width: 576px) {
      .track-card {
        padding: 2rem 1.5rem;
      }
      
      h1 {
        font-size: 2rem;
      }
    }
  </style>
</head>
<body>
  <div id="navbar-container"></div>

  <div class="main-content">
    <div class="track-card">
      <h1>Track Your Order</h1>
      
      <div class="breadcrumb-links">
        <a href="index.html">Home</a>
        <span>/</span>
        <span style="color: var(--main-color);">Track Your Order</span>
      </div>
      
      <div class="description">
        To track your order please enter your Order ID in the box below and press the "Track Order" button. This was given to you on your receipt and in the confirmation email you should have received.
      </div>
      
      <form id="trackOrderForm" onsubmit="trackOrder(event)">
        <div class="form-group">
          <label class="form-label">
            Order ID <span>*</span>
          </label>
          <div class="input-wrapper">
            <i class="fas fa-hashtag input-icon"></i>
            <input type="text" class="form-control" id="orderId" placeholder="Enter Your Order ID" required>
          </div>
          <div class="error-message" id="orderIdError">
            <i class="fas fa-exclamation-circle"></i> Invalid Order ID
          </div>
        </div>
        
        <div class="form-group">
          <label class="form-label">
            Billing Email <span>*</span>
          </label>
          <div class="input-wrapper">
            <i class="fas fa-envelope input-icon"></i>
            <input type="email" class="form-control" id="billingEmail" placeholder="Enter Email Address" required>
          </div>
          <div class="error-message" id="emailError">
            <i class="fas fa-exclamation-circle"></i> This email doesn't match the order email
          </div>
        </div>
        
        <button type="submit" class="track-btn" id="trackBtn">
          <i class="fas fa-search"></i> Track Order
        </button>
      </form>
    </div>
  </div>

  <div id="footer-container"></div>

  <script>
    const ORDERS_API_URL = 'https://69a0ea5f2e82ee536f9fcd23.mockapi.io/data';

    async function findOrderInAPI(orderId, email) {
      try {
        const response = await fetch(ORDERS_API_URL);
        if (!response.ok) return null;
        const allOrders = await response.json();

        // Try to match by orderId (string) OR by id (number from API), with optional email check
        const normalId = String(orderId).trim();
        return allOrders.find(order => {
          const idMatch =
            String(order.orderId || '').trim() === normalId ||
            String(order.id || '').trim() === normalId;
          if (!idMatch) return false;
          // If email provided, validate it; if order has no email stored, allow
          if (email) {
            const orderEmail = (order.customer?.email || '').toLowerCase();
            if (orderEmail && orderEmail !== email.toLowerCase()) return false;
          }
          return true;
        }) || null;
      } catch (error) {
        console.error('Error finding order in API:', error);
        return null;
      }
    }

    async function trackOrder(event) {
      event.preventDefault();
      const btn = document.querySelector('.track-btn');
      const origHtml = btn ? btn.innerHTML : '';
      if (btn) { btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Tracking…'; }

      const enteredId    = document.getElementById('orderId').value.trim();
      const enteredEmail = document.getElementById('billingEmail')?.value?.trim() || '';

      const orderInput = document.getElementById('orderId');
      const errorDiv   = document.getElementById('orderIdError');
      orderInput.classList.remove('error', 'success');
      if (errorDiv) errorDiv.style.display = 'none';

      if (!enteredId) {
        orderInput.classList.add('error');
        if (btn) { btn.disabled = false; btn.innerHTML = origHtml; }
        return;
      }

      try {
        const orderFromAPI = await findOrderInAPI(enteredId, enteredEmail);
        if (orderFromAPI) {
          localStorage.setItem('trackingOrderId',   String(orderFromAPI.orderId || orderFromAPI.id || enteredId));
          localStorage.setItem('currentOrderData',  JSON.stringify(orderFromAPI));
          window.location.href = 'Order_Status.html';
          return;
        }
      } catch (err) {
        console.warn('[TrackOrder] API search failed:', err.message);
      }

      // Not found
      orderInput.classList.add('error');
      if (errorDiv) { errorDiv.style.display = 'block'; errorDiv.textContent = 'Order not found. Please check your Order ID and try again.'; }
      if (btn) { btn.disabled = false; btn.innerHTML = origHtml; }
    }

    document.getElementById('orderId').addEventListener('input', function() {
      this.classList.remove('error', 'success');
      const errorDiv = document.getElementById('orderIdError');
      if (errorDiv) errorDiv.style.display = 'none';
    });

    window.onload = function() {
      // Pre-fill order ID if coming from Order_Placed page
      const lastId = localStorage.getItem('lastOrderId');
      if (lastId) {
        const input = document.getElementById('orderId');
        if (input && !input.value) input.value = lastId;
      }
      const lastEmail = localStorage.getItem('lastOrderEmail');
      if (lastEmail) {
        const emailInput = document.getElementById('billingEmail');
        if (emailInput && !emailInput.value) emailInput.value = lastEmail;
      }
    };

    // Support form submit via button click (may not be in a form)
    document.addEventListener('DOMContentLoaded', () => {
      const trackBtn = document.querySelector('.track-btn');
      if (trackBtn && !trackBtn.closest('form')) {
        trackBtn.addEventListener('click', trackOrder);
      }
      const form = document.querySelector('form');
      if (form) form.addEventListener('submit', trackOrder);
    });
  </script>
</body>
</html>
