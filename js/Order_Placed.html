<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Placed · Amazino</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  
  <script src="js/auth.js"></script>
  <script src="js/store.js"></script>
  <script src="js/data.js"></script>
  <script src="js/navbar.js"></script>
  <script src="js/footer.js"></script>
  <link rel="stylesheet" type="text/css" href="css/components.css">
  <link rel="stylesheet" href="css/Navbarauth.css">
  
  <style>
    :root {
      --main-color: rgb(124, 29, 124);
      --main-color-hover: rgb(144, 86, 144);
      --secondary-color: #B19470;
    }
    
    body {
      background-color: #f5f5f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      margin: 0;
      padding: 0;
    }
    
    .main-content {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    
    .icon-circle {
      width: 90px;
      height: 90px;
      background-color: var(--main-color);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      animation: pulse 1.5s infinite;
    }
    
    @keyframes pulse {
      0% { transform: scale(1); box-shadow: 0 0 0 0 var(--main-color); }
      50% { transform: scale(1.05); box-shadow: 0 0 20px 5px var(--main-color); }
      100% { transform: scale(1); box-shadow: 0 0 0 0 var(--main-color); }
    }
    
    .icon-circle i {
      font-size: 48px;
      color: white;
    }
    
    .info-box {
      border: 2px solid var(--main-color);
      border-radius: 20px;
      overflow: hidden;
      max-width: 370px;
      margin: 0 auto;
    }
    
    .info-row {
      display: flex;
      justify-content: space-between;
      padding: 15px 20px;
    }
    
    .info-row:first-child {
      border-bottom: 2px solid var(--main-color);
    }
    
    .info-label {
      color: #6c757d;
      font-weight: 500;
    }
    
    .info-value {
      color: var(--secondary-color);
      font-weight: 700;
    }
    
    .btn-custom-primary {
      background-color: var(--main-color);
      color: white;
      border-radius: 50px;
      padding: 12px;
      font-weight: 600;
      width: 75%;
      border: none;
      align-self: center;
    }
    
    .btn-custom-primary:hover {
      background-color: var(--main-color-hover);
    }
    
    .btn-custom-outline {
      background-color: transparent;
      color: var(--main-color);
      border: 2px solid var(--main-color);
      border-radius: 50px;
      padding: 12px;
      font-weight: 600;
      width: 75%;
      align-self: center;
    }
    
    .btn-custom-outline:hover {
      background-color: rgba(124, 29, 124, 0.05);
    }
  </style>
</head>
<body>
  <div id="navbar-container"></div>

  <div class="main-content">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-12 col-md-6 col-lg-5">
          <div class="text-center">
            <div class="icon-circle">
              <i class="bi bi-check-lg"></i>
            </div>
            
            <h2 class="h2 fw-bold mt-3" style="color: var(--main-color);">Order Placed Successfully!</h2>
            
            <p class="text-secondary-emphasis mb-4">Your Order has been confirmed, it will be delivered soon.</p>
          </div>
          
          <div class="info-box bg-white mb-4">
            <div class="info-row">
              <span class="info-label">Order Number</span>
              <span class="info-value" id="orderNumber">...</span>
            </div>
            <div class="info-row">
              <span class="info-label">Estimated Delivery</span>
              <div class="info-value">
                <span>3-5</span>
                <span class="fw-normal text-secondary">Business Days</span>
              </div>
            </div>
          </div>
          
          <div class="d-flex flex-column gap-3">
            <button class="btn-custom-primary" id="backBtn">Back to Home</button>
            <button class="btn-custom-outline" id="trackBtn">Track Order</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="footer-container"></div>
  
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>

  <script>
    // Order was already saved to API in Summary.html — just display the stored ID here.
    window.onload = async function() {
      const orderId = localStorage.getItem('lastOrderId') || '—';
      document.getElementById('orderNumber').textContent = orderId;

      // Clean up tracking flag
      localStorage.removeItem('lastOrderPushed');

      // 🎉 Confetti celebration
      confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 },
        colors: ['#7c1d7c', '#B19470', '#ff6b6b', '#4ecdc4', '#ffe66d'] });
      setTimeout(() => {
        confetti({ particleCount: 50, spread: 100, origin: { x: 0.2, y: 0.5 } });
        confetti({ particleCount: 50, spread: 100, origin: { x: 0.8, y: 0.5 } });
      }, 200);
    };

    document.getElementById('backBtn').addEventListener('click', function() {
      confetti({ particleCount: 80, spread: 60, origin: { y: 0.5 } });
      setTimeout(() => { window.location.href = 'index.html'; }, 300);
    });

    document.getElementById('trackBtn').addEventListener('click', function() {
      confetti({ particleCount: 80, spread: 60, origin: { y: 0.5 } });
      setTimeout(() => { window.location.href = 'Track_Order.html'; }, 300);
    });
  </script>
</body>
</html>
