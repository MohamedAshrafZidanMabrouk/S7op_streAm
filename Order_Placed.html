<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Placed · Amazino</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  
  <script src="js/navbar.js" defer></script>
  <script src="js/footer.js" defer></script>
  <link rel="stylesheet" type="text/css" href="css/components.css">
  
  <style>
    :root {
      --main-color: rgb(124, 29, 124);
      --main-color-hover: rgb(144, 86, 144);
      --secondary-color: #B19470;
    }
    
    body {
      background-color: #f5f5f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      margin: 0;
      padding: 0;
    }
    
    .main-content {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    
    .icon-circle {
      width: 90px;
      height: 90px;
      background-color: var(--main-color);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      animation: pulse 1.5s infinite;
    }
    
    @keyframes pulse {
      0% { transform: scale(1); box-shadow: 0 0 0 0 var(--main-color); }
      50% { transform: scale(1.05); box-shadow: 0 0 20px 5px var(--main-color); }
      100% { transform: scale(1); box-shadow: 0 0 0 0 var(--main-color); }
    }
    
    .icon-circle i {
      font-size: 48px;
      color: white;
    }
    
    .info-box {
      border: 2px solid var(--main-color);
      border-radius: 20px;
      overflow: hidden;
      max-width: 370px;
      margin: 0 auto;
    }
    
    .info-row {
      display: flex;
      justify-content: space-between;
      padding: 15px 20px;
    }
    
    .info-row:first-child {
      border-bottom: 2px solid var(--main-color);
    }
    
    .info-label {
      color: #6c757d;
      font-weight: 500;
    }
    
    .info-value {
      color: var(--secondary-color);
      font-weight: 700;
    }
    
    .btn-custom-primary {
      background-color: var(--main-color);
      color: white;
      border-radius: 50px;
      padding: 12px;
      font-weight: 600;
      width: 75%;
      border: none;
      align-self: center;
    }
    
    .btn-custom-primary:hover {
      background-color: var(--main-color-hover);
    }
    
    .btn-custom-outline {
      background-color: transparent;
      color: var(--main-color);
      border: 2px solid var(--main-color);
      border-radius: 50px;
      padding: 12px;
      font-weight: 600;
      width: 75%;
      align-self: center;
    }
    
    .btn-custom-outline:hover {
      background-color: rgba(124, 29, 124, 0.05);
    }
  </style>
</head>
<body>
  <div id="navbar-container"></div>

  <div class="main-content">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-12 col-md-6 col-lg-5">
          <div class="text-center">
            <div class="icon-circle">
              <i class="bi bi-check-lg"></i>
            </div>
            
            <h2 class="h2 fw-bold mt-3" style="color: var(--main-color);">Order Placed Successfully!</h2>
            
            <p class="text-secondary-emphasis mb-4">Your Order has been confirmed, it will be delivered soon.</p>
          </div>
          
          <div class="info-box bg-white mb-4">
            <div class="info-row">
              <span class="info-label">Order Number</span>
              <span class="info-value" id="orderNumber">...</span>
            </div>
            <div class="info-row">
              <span class="info-label">Estimated Delivery</span>
              <div class="info-value">
                <span>3-5</span>
                <span class="fw-normal text-secondary">Business Days</span>
              </div>
            </div>
          </div>
          
          <div class="d-flex flex-column gap-3">
            <button class="btn-custom-primary" id="backBtn">Back to Home</button>
            <button class="btn-custom-outline" id="trackBtn">Track Order</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="footer-container"></div>
  
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
  
  <script>
    const ORDERS_API_URL = 'https://69a0ea5f2e82ee536f9fcd23.mockapi.io/data';
    const GLOBAL_ORDER_COUNTER = 'globalOrderCounter';

    function getNextOrderNumber() {
      let lastCounter = localStorage.getItem(GLOBAL_ORDER_COUNTER);
      if (!lastCounter) {
        lastCounter = 1;
      } else {
        lastCounter = parseInt(lastCounter) + 1;
      }
      localStorage.setItem(GLOBAL_ORDER_COUNTER, lastCounter);
      return lastCounter;
    }

    function getFormattedOrderNumber() {
      const orderNum = getNextOrderNumber();
      return `#SDGT${String(orderNum).padStart(4, '0')}`;
    }

    async function saveOrderToAPI(orderData) {
      try {
        const response = await fetch(ORDERS_API_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify(orderData)
        });

        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }

        const result = await response.json();
        console.log('Order saved successfully:', result);
        return result;
      } catch (error) {
        console.error('Error saving order to API:', error);
        alert('There was a problem confirming your order. Please try again.');
        return null;
      }
    }

    function prepareOrderData(orderNumber) {
      const cart = JSON.parse(localStorage.getItem('shoppingCart')) || [];
      const shippingData = JSON.parse(localStorage.getItem('shippingData')) || {};
      const paymentMethod = localStorage.getItem('paymentMethod') || 'cod';

      let subtotal = 0;
      cart.forEach(item => {
        subtotal += (item.price || 0) * (item.quantity || 1);
      });

      const discount = 0;
      const shipping = 0;
      const tax = 0;
      const total = subtotal - discount + shipping + tax;

      const orderData = {
        orderId: orderNumber,
        orderDate: new Date().toISOString().split('T')[0],
        customer: {
          firstName: shippingData.firstName || '',
          lastName: shippingData.lastName || '',
          email: shippingData.orderEmail || shippingData.email || '',
          phone: shippingData.phone || '',
        },
        shippingAddress: {
          street: shippingData.street || '',
          city: shippingData.city || '',
          state: shippingData.state || '',
          zip: shippingData.zip || '',
          country: shippingData.country || '',
        },
        paymentMethod: paymentMethod,
        items: cart.map(item => ({
          id: item.id,
          name: item.name,
          price: item.price,
          quantity: item.quantity,
          color: item.color || 'Black'
        })),
        totals: {
          subtotal: subtotal,
          discount: discount,
          shipping: shipping,
          tax: tax,
          total: total
        },
        status: 'pending'
      };
      return orderData;
    }

    window.onload = async function() {
      const formattedOrderNumber = getFormattedOrderNumber();
      document.getElementById('orderNumber').textContent = formattedOrderNumber;
      localStorage.setItem('lastOrderId', formattedOrderNumber);

      const shippingData = JSON.parse(localStorage.getItem('shippingData'));
      if (shippingData?.email) {
        localStorage.setItem('lastOrderEmail', shippingData.email);
      }

      const orderData = prepareOrderData(formattedOrderNumber);
      await saveOrderToAPI(orderData);

      confetti({
        particleCount: 100,
        spread: 70,
        origin: { y: 0.6 },
        colors: ['#7c1d7c', '#B19470', '#ff6b6b', '#4ecdc4', '#ffe66d']
      });

      setTimeout(() => {
        confetti({
          particleCount: 50,
          spread: 100,
          origin: { x: 0.2, y: 0.5 }
        });
        confetti({
          particleCount: 50,
          spread: 100,
          origin: { x: 0.8, y: 0.5 }
        });
      }, 200);
    };
    
    document.getElementById('backBtn').addEventListener('click', function() {
      confetti({
        particleCount: 80,
        spread: 60,
        origin: { y: 0.5 }
      });
      setTimeout(() => {
        window.location.href = 'index.html';
      }, 300);
    });
    
    document.getElementById('trackBtn').addEventListener('click', function() {
      confetti({
        particleCount: 80,
        spread: 60,
        origin: { y: 0.5 }
      });
      setTimeout(() => {
        window.location.href = 'Track_Order.html';
      }, 300);
    });
  </script>
</body>
</html>
